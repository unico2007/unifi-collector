server:
  addr: ":8080"
  read_timeout: 15s
  write_timeout: 15s

logging:
  level: info      # debug | info | warn | error
  format: json     # json | console

unifi:
  # Replace with your controller details, or copy this file to
  # configs/config.local.yaml (gitignored) and keep real values there.
  url: "https://CONTROLLER_IP"
  username: "YOUR_USERNAME"
  password: "YOUR_PASSWORD"
  site: "default"
  verify_tls: false
  timeout: 10s
  max_retries: 3
  auth_failure_cooldown: 60s

# Optional second vendor: Kerio Control firewall (JSON-RPC admin API on :4081).
# Disabled by default. Enable it and fill in the values (or override via
# COLLECTOR_KERIO_* env / .env) to surface its interfaces as devices alongside
# UniFi in the shared "devices" collector.
kerio:
  enabled: false
  url: "https://KERIO_IP:4081"
  username: "KERIO_USERNAME"
  password: "KERIO_PASSWORD"
  verify_tls: false
  timeout: 10s

loki:
  enabled: true
  url: "http://loki:3100/loki/api/v1/push"
  batch_size: 100
  batch_wait: 5s
  # tenant: ""     # optional X-Scope-OrgID for multi-tenant Loki

# Push-based syslog receiver. Point your UniFi controller/devices here
# (UniFi: Settings -> System -> Remote Logging -> host = docker host IP, port 514).
# The container listens on 1514 (non-root); docker-compose maps host 514 -> 1514.
syslog:
  enabled: true
  udp_addr: ":1514"
  # tcp_addr: ":1514"   # optional TCP listener
  vendor: "unifi"
  site: "default"

# Per-collector schedule. Add a new key to register a collector without
# touching any Go struct.
collectors:
  # devices is the only collector that also polls Kerio; 60s halves the
  # firewall-side request/login noise (30s looked like probing to the admins)
  # while device state is still fresh enough for the dashboard.
  devices:
    enabled: true
    interval: 60s
  clients:
    enabled: true
    interval: 30s
  events:
    enabled: true
    interval: 10s
  health:
    enabled: true
    interval: 30s
