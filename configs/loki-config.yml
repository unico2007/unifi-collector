# Minimal single-binary Loki config with filesystem storage. Suitable for a
# single-node monitoring stack; scale out schema/storage for production HA.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  reject_old_samples: false
  retention_period: 168h

# Without an enabled compactor the retention_period above is inert — Loki never
# deletes anything and loki-data grows without bound until the disk fills. The
# compactor enforces the 168h window (filesystem delete store, single node).
compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem
  compaction_interval: 10m
  retention_delete_delay: 2h

ruler:
  alertmanager_url: http://localhost:9093
