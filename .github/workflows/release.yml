name: Release

# Build and publish all three container images to GHCR.
#   - every push to main  -> ghcr.io/<repo>{,-web,-ai}:latest (+ :sha)  [continuous deploy]
#   - a version tag v1.2.3 -> :1.2.3 and :1.2                           [pinned release]
# Watchtower on the server watches :latest for each and auto-pulls new images.
#   collector -> ghcr.io/<repo>        (Dockerfile,      context .)
#   web (BFF) -> ghcr.io/<repo>-web    (Dockerfile.web,  context .)
#   ai        -> ghcr.io/<repo>-ai     (ai/Dockerfile,   context ai)
on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: collector
            suffix: ""
            context: .
            file: Dockerfile
          - name: web
            suffix: -web
            context: .
            file: Dockerfile.web
          - name: ai
            suffix: -ai
            context: ai
            file: ai/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}${{ matrix.suffix }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
