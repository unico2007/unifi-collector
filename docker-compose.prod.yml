# Production override for the company server. It runs the images published to
# GHCR by CI instead of building from source, and adds Watchtower to auto-pull
# and restart collector/web/ai whenever a new :latest image is pushed.
#
# Deploy on the server (include the web + ai overlays so those services exist to
# be overridden):
#   docker compose -f docker-compose.yml -f docker-compose.ai.yml \
#     -f docker-compose.web.yml -f docker-compose.prod.yml up -d
#
# Requires Docker Compose v2.24+ (for `!reset`) and the three GHCR packages made
# public (or a `docker login ghcr.io` on the server). After this, a push to main
# rebuilds the images in CI and Watchtower rolls them out within ~60s — no more
# manual zip-download + build on the server.
services:
  collector:
    # Drop the source build from the base file and pull the published image.
    build: !reset null
    image: ghcr.io/unico2007/unifi-collector:latest
    pull_policy: always
    labels:
      # Only containers with this label are watched (see watchtower --label-enable),
      # so loki/prometheus/grafana are NOT auto-updated.
      com.centurylinklabs.watchtower.enable: "true"

  web:
    build: !reset null
    image: ghcr.io/unico2007/unifi-collector-web:latest
    pull_policy: always
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  ai:
    build: !reset null
    image: ghcr.io/unico2007/unifi-collector-ai:latest
    pull_policy: always
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    environment:
      # Watchtower's bundled Docker client negotiates too low an API version for
      # a modern Docker Engine (29.x needs >= 1.40), which otherwise crash-loops
      # it with "client version 1.25 is too old". Pin a supported version.
      DOCKER_API_VERSION: "1.44"
      # Credentials Watchtower uses to pull the (private) GHCR image. Set
      # GHCR_USER / GHCR_TOKEN in .env. Leave them unset if you made the GHCR
      # package public instead — empty values are simply ignored.
      REPO_USER: "${GHCR_USER:-}"
      REPO_PASS: "${GHCR_TOKEN:-}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Poll the registry every 60s, only for labelled containers, and clean up
    # the old image after a successful update.
    command: --interval 60 --cleanup --label-enable
