# Unico BFF + frontend overlay. Run alongside the base stack (and the AI
# overlay) on the server:
#   docker compose -f docker-compose.yml -f docker-compose.ai.yml -f docker-compose.web.yml up -d
# Then create the first admin (no self-register endpoint):
#   docker exec web /web -create-user -user admin -pass 'CHANGEME' -role admin
# Everyone on the LAN reaches the dashboard at http://<server-ip>/
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: unifi-collector-web:local
    container_name: web
    restart: unless-stopped
    ports:
      - "80:8080"
    environment:
      WEB_PROMETHEUS_URL: "http://prometheus:9090"
      WEB_LOKI_URL: "http://loki:3100"
      WEB_AI_URL: "http://ai:8090"
      WEB_DB: "/data/users.db"
    volumes:
      - web-data:/data
    depends_on:
      - prometheus
      - loki

volumes:
  web-data:
